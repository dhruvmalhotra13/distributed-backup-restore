name: distributed-backup-restore

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-backup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backup}
      POSTGRES_DB: ${POSTGRES_DB:-backup}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backup}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672" # management UI
    healthcheck:
      # check_port_connectivity confirms the AMQP listener (5672) is actually
      # accepting connections, not just that the Erlang node is up.
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-backup};Username=${POSTGRES_USER:-backup};Password=${POSTGRES_PASSWORD:-backup}"
      ConnectionStrings__Redis: "redis:6379"
      RabbitMq__Host: "rabbitmq"
      Storage__VaultPath: "/data/BackupVault"
      Storage__ChunkSizeBytes: "4194304"
      # Lets the UI accept any real host path under HOST_HOME and translate it.
      HostPaths__WindowsRoot: "${HOST_HOME:-/host}"
      HostPaths__ContainerRoot: "/host"
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      # Whole user folder mounted once, so any folder under it can be backed up
      # or restored by typing its path in the UI — no per-folder config edits.
      - ${HOST_HOME:-./sample-data}:/host
      - ${VAULT_DIR:-./data/BackupVault}:/data/BackupVault

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-backup};Username=${POSTGRES_USER:-backup};Password=${POSTGRES_PASSWORD:-backup}"
      ConnectionStrings__Redis: "redis:6379"
      RabbitMq__Host: "rabbitmq"
      Storage__VaultPath: "/data/BackupVault"
      Storage__ChunkSizeBytes: "4194304"
    volumes:
      - ${HOST_HOME:-./sample-data}:/host
      - ${VAULT_DIR:-./data/BackupVault}:/data/BackupVault
    # Scale horizontally with:  docker compose up --scale worker=3
    deploy:
      replicas: 1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle; the browser reaches the API on the host.
        NEXT_PUBLIC_API_BASE: "http://localhost:${API_PORT:-8080}"
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres-data:
